name: Lighthouse CI

on:
  # Запуск каждый день в 7:00 UTC (10:00 МСК)
  schedule:
    - cron: '0 7 * * *'
  
  # Возможность запустить вручную из интерфейса GitHub Actions
  workflow_dispatch:

jobs:
  lighthouse:
    name: Run Lighthouse CI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'code/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./code
        run: npm ci
      
      - name: Build web application
        working-directory: ./code
        run: npm run build --workspace=web
      
      - name: Start preview server
        working-directory: ./code/apps/web
        run: |
          npm run preview -- --port 4173 --host &
          echo "PREVIEW_PID=$!" >> $GITHUB_ENV
      
      - name: Wait for server to be ready
        run: |
          npx wait-on http://localhost:4173 -t 60000
      
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x
      
      - name: Run Lighthouse CI
        run: lhci autorun
        continue-on-error: true
      
      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports-${{ github.run_number }}
          path: .lighthouseci/
          retention-days: 90
      
      - name: Generate summary
        if: always()
        run: |
          echo "## 📊 Lighthouse CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Lighthouse проверил приложение на:" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Performance (производительность)" >> $GITHUB_STEP_SUMMARY
          echo "- ♿ Accessibility (доступность)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Best Practices (лучшие практики)" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 SEO (оптимизация для поисковых систем)" >> $GITHUB_STEP_SUMMARY
          echo "- 📱 PWA (Progressive Web App)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Скачайте артефакты 'lighthouse-reports-${{ github.run_number }}' для просмотра детальных HTML отчетов." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📅 Дата запуска: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
      
      - name: Cleanup
        if: always()
        run: |
          if [ ! -z "$PREVIEW_PID" ]; then
            kill $PREVIEW_PID 2>/dev/null || true
          fi
