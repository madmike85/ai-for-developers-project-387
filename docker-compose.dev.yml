services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: call_calendar_db
    environment:
      POSTGRES_DB: call_calendar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d call_calendar"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  # API (NestJS Backend)
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: call_calendar_api
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/call_calendar?schema=public
      - FRONTEND_URL=http://localhost:5173
      - PORT=3000
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      # Hot-reload volumes - code from host
      - ./apps/api:/app/apps/api
      - ./packages/db:/app/packages/db
      # Anonymous volumes to preserve container's node_modules
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/db/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - app-network

  # Web (React + Vite Frontend)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: call_calendar_web
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_USE_MOCK_API=false
      - PORT=5173
    ports:
      - "5173:5173"
    volumes:
      # No bind mounts to avoid native binding issues
      # All code is copied during build, hot-reload disabled for web in Docker
      # To develop with hot-reload, run 'npm run dev' locally instead
      - /app/node_modules
      - /app/apps/web/node_modules
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
